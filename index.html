<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entre Líneas | Tienda de Libros</title>
  <link rel="icon" type="image/svg+xml" sizes="any" href="img/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&family=Merriweather:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="topbar py-3">
    <div class="container d-flex flex-wrap justify-content-between align-items-center gap-3">
      <div>
        <h1 class="brand-title mb-0">Entre Líneas</h1>
      </div>
      <div class="d-flex flex-wrap gap-2">
        <button id="toggleCartBtn" type="button" class="btn btn-light control-btn">
          <span class="control-icon" aria-hidden="true">&#128722;</span>
          <span class="btn-label">Ocultar cesta</span>
        </button>
        <button id="adminAccessBtn" type="button" class="btn btn-outline-light control-btn">
          <span class="control-icon" aria-hidden="true">&#9881;</span>
          <span>Administracion</span>
        </button>
      </div>
    </div>
  </header>

  <main class="container py-4 py-lg-5">
    <div id="systemMessage" class="alert d-none mb-4" role="alert"></div>

    <div class="row g-4 align-items-start">
      <section id="productsColumn" class="col-12 col-lg-8">
        <h2 class="section-title">Catálogo de productos</h2>
        <div id="productsContainer"></div>
      </section>

      <aside id="cartColumn" class="col-12 col-lg-4">
        <div class="cart-panel shadow-sm">
          <h2 class="section-title mb-3">Cesta de la compra</h2>
          <div id="cartItems" class="cart-items"></div>
          <div class="cart-footer">
            <p class="total-label mb-2">Total pedido: <strong id="cartTotal">0.00 €</strong></p>
            <button id="placeOrderBtn" type="button" class="btn btn-success w-100">Realizar Pedido</button>
            <p id="orderConfirmation" class="order-confirmation d-none mt-3 mb-0"></p>
          </div>
        </div>
      </aside>
    </div>
  </main>

  <div class="modal fade" id="adminModal" tabindex="-1" aria-labelledby="adminModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h3 class="modal-title fs-5" id="adminModalLabel">Menú de administración</h3>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <p class="text-muted mb-4">Desde aquí puedes crear categorías y productos nuevos.</p>
          <div id="adminMessage" class="small mb-4"></div>

          <div class="row g-4">
            <div class="col-12 col-md-6">
              <div class="admin-box">
                <h4 class="h6">Nueva categoría</h4>
                <form id="categoryForm" novalidate>
                  <div class="mb-3">
                    <label for="categoryId" class="form-label">Identificador único</label>
                    <input id="categoryId" name="categoryId" class="form-control" type="text" maxlength="30" required>
                  </div>
                  <div class="mb-3">
                    <label for="categoryName" class="form-label">Nombre visible</label>
                    <input id="categoryName" name="categoryName" class="form-control" type="text" maxlength="60" required>
                  </div>
                  <button class="btn btn-primary w-100" type="submit">Agregar categoría</button>
                </form>
              </div>
            </div>

            <div class="col-12 col-md-6">
              <div class="admin-box">
                <h4 class="h6">Nuevo producto</h4>
                <form id="productForm" novalidate>
                  <div class="mb-3">
                    <label for="productTitle" class="form-label">Título</label>
                    <input id="productTitle" name="productTitle" class="form-control" type="text" maxlength="100" required>
                  </div>
                  <div class="mb-3">
                    <label for="productCode" class="form-label">Código único</label>
                    <input id="productCode" name="productCode" class="form-control" type="text" maxlength="20" required>
                  </div>
                  <div class="mb-3">
                    <label for="productCategory" class="form-label">Categoría</label>
                    <select id="productCategory" name="productCategory" class="form-select" required></select>
                  </div>
                  <div class="mb-3">
                    <label for="productDescription" class="form-label">Descripción breve</label>
                    <input id="productDescription" name="productDescription" class="form-control" type="text" maxlength="120" required>
                  </div>
                  <div class="row g-2">
                    <div class="col-6">
                      <label for="productPrice" class="form-label">Precio</label>
                      <input id="productPrice" name="productPrice" class="form-control" type="number" min="0" step="0.01" required>
                    </div>
                    <div class="col-6">
                      <label for="productStock" class="form-label">Stock</label>
                      <input id="productStock" name="productStock" class="form-control" type="number" min="0" step="1" required>
                    </div>
                  </div>
                  <div class="mt-3 mb-3">
                    <label for="productImageName" class="form-label">Archivo de imagen en carpeta img</label>
                    <input id="productImageName" name="productImageName" class="form-control" type="text" placeholder="ejemplo.jpg">
                  </div>
                  <button class="btn btn-primary w-100" type="submit">Agregar producto</button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
