<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entre Líneas | Tienda de Libros</title>
    <link rel="icon" type="image/svg+xml" sizes="any" href="img/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&family=Merriweather:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header class="topbar py-3">
        <div class="container">
            <div class="d-flex flex-wrap justify-content-between align-items-center gap-3">
                <div>
                    <h1 class="brand-title mb-0">Entre Líneas</h1>
                </div>
                <div class="d-flex flex-wrap gap-2">
                    <div class="category-quick-nav">
                        <label for="categoryQuickNav" class="category-quick-nav-label visually-hidden">Ir a categoría</label>
                        <select id="categoryQuickNav" class="form-select category-quick-nav-select" aria-label="Seleccionar categoría"></select>
                    </div>
                    <button id="toggleCartBtn" type="button" class="btn btn-outline-light control-btn">
                        <span class="control-icon" aria-hidden="true"><svg height="21" viewBox="0 0 21 21" width="21" xmlns="http://www.w3.org/2000/svg"><g fill="none" fill-rule="evenodd" transform="translate(2 4)"><path d="m3 2.5h12.5l-1.5855549 5.54944226c-.2453152.85860311-1.0300872 1.45055774-1.9230479 1.45055774h-6.70131161c-1.01909844 0-1.87522688-.76627159-1.98776747-1.77913695l-.80231812-7.22086305h-2" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><g fill="currentColor"><circle cx="5" cy="12" r="1"/><circle cx="13" cy="12" r="1"/></g></g></svg></span>
                        <span class="btn-label">Ocultar cesta</span>
                    </button>
                    <button id="adminAccessBtn" type="button" class="btn btn-outline-light control-btn">
                        <span class="control-icon" aria-hidden="true"><svg height="21" viewBox="0 0 21 21" width="21" xmlns="http://www.w3.org/2000/svg"><g fill="none" fill-rule="evenodd" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" transform="translate(3 3)"><path d="m7.5.5c.35132769 0 .69661025.02588228 1.03404495.07584411l.50785434 1.53911115c.44544792.12730646.86820077.30839026 1.26078721.53578009l1.4600028-.70360861c.5166435.39719686.9762801.86487779 1.3645249 1.388658l-.7293289 1.44720284c.2201691.39604534.3936959.82158734.5131582 1.2692035l1.5298263.5338186c.0390082.29913986.0591302.60421522.0591302.91399032 0 .35132769-.0258823.69661025-.0758441 1.03404495l-1.5391112.50785434c-.1273064.44544792-.3083902.86820077-.5357801 1.26078721l.7036087 1.4600028c-.3971969.5166435-.8648778.9762801-1.388658 1.3645249l-1.4472029-.7293289c-.39604532.2201691-.82158732.3936959-1.26920348.5131582l-.5338186 1.5298263c-.29913986.0390082-.60421522.0591302-.91399032.0591302-.35132769 0-.69661025-.0258823-1.03404495-.0758441l-.50785434-1.5391112c-.44544792-.1273064-.86820077-.3083902-1.26078723-.5357801l-1.46000277.7036087c-.51664349-.3971969-.97628006-.8648778-1.36452491-1.388658l.72932886-1.4472029c-.2203328-.39633993-.39395403-.82222042-.51342462-1.27020241l-1.52968981-.53381682c-.03892294-.29882066-.05900023-.60356226-.05900023-.91299317 0-.35132769.02588228-.69661025.07584411-1.03404495l1.53911115-.50785434c.12730646-.44544792.30839026-.86820077.53578009-1.26078723l-.70360861-1.46000277c.39719686-.51664349.86487779-.97628006 1.388658-1.36452491l1.44720284.72932886c.39633995-.2203328.82222044-.39395403 1.27020243-.51342462l.53381682-1.52968981c.29882066-.03892294.60356226-.05900023.91299317-.05900023z" stroke-width=".933"/><circle cx="7.5" cy="7.5" r="3"/></g></svg></span>
                        <span>Administración</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="container py-4 py-lg-5">
        <div id="systemMessage" class="alert d-none mb-4" role="alert"></div>

        <div class="row g-4 align-items-start">
            <section id="productsColumn" class="col-12 col-lg-8">
                <h2 class="section-title">Catálogo de productos</h2>
                <div class="catalog-toolbar">
                    <div class="catalog-toolbar-item">
                        <label for="catalogSearch" class="catalog-toolbar-label">Buscar en catálogo</label>
                        <input id="catalogSearch" type="search" class="form-control" placeholder="Título, código o descripción">
                    </div>
                    <div class="catalog-toolbar-item">
                        <label for="catalogSort" class="catalog-toolbar-label">Ordenar por</label>
                        <select id="catalogSort" class="form-select">
                            <option value="default">Sin orden</option>
                            <option value="titulo-asc">Título (A-Z)</option>
                            <option value="titulo-desc">Título (Z-A)</option>
                            <option value="precio-asc">Precio (menor a mayor)</option>
                            <option value="precio-desc">Precio (mayor a menor)</option>
                        </select>
                    </div>
                </div>
                <div id="productsContainer"></div>
            </section>

            <aside id="cartColumn" class="col-12 col-lg-4">
                <div class="cart-panel shadow-sm">
                    <h2 class="section-title mb-3">Cesta de la compra</h2>
                    <div id="cartItems" class="cart-items"></div>
                    <div class="cart-footer">
                        <p class="total-label mb-2">Total pedido: <strong id="cartTotal">0.00 €</strong></p>
                        <button id="placeOrderBtn" type="button" class="btn btn-success w-100">
                            <span class="order-icon" aria-hidden="true">
                                <svg height="21" viewBox="0 0 21 21" width="21" xmlns="http://www.w3.org/2000/svg"><path d="m.5 5.5 3 3 8.028-8" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" transform="translate(5 6)"/></svg>
                            </span>
                            <span>Realizar Pedido</span>
                        </button>
                        <button id="clearCartBtn" type="button" class="btn btn-outline-secondary w-100 mt-2">Vaciar cesta</button>
                        <p id="orderConfirmation" class="order-confirmation d-none mt-3 mb-0"></p>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <div class="modal fade" id="adminModal" tabindex="-1" aria-labelledby="adminModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 class="modal-title fs-5" id="adminModalLabel">Menú de administración</h3>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted mb-4">Desde aquí puedes crear categorías y productos nuevos.</p>
                    <div id="adminMessage" class="small mb-4"></div>

                    <div class="row g-4">
                        <div class="col-12 col-md-6">
                            <div class="admin-box">
                                <h4 class="h6">Nueva categoría</h4>
                                <form id="categoryForm" novalidate>
                                    <div class="mb-3">
                                        <label for="categoryId" class="form-label">Identificador único</label>
                                        <input id="categoryId" name="categoryId" class="form-control" type="text"
                                            maxlength="30" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="categoryName" class="form-label">Nombre visible</label>
                                        <input id="categoryName" name="categoryName" class="form-control" type="text"
                                            maxlength="60" required>
                                    </div>
                                    <button class="btn btn-primary w-100" type="submit">Agregar categoría</button>
                                </form>
                            </div>
                        </div>

                        <div class="col-12 col-md-6">
                            <div class="admin-box">
                                <h4 class="h6">Nuevo producto</h4>
                                <form id="productForm" novalidate>
                                    <div class="mb-3">
                                        <label for="productTitle" class="form-label">Título</label>
                                        <input id="productTitle" name="productTitle" class="form-control" type="text"
                                            maxlength="100" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="productCode" class="form-label">Código único</label>
                                        <input id="productCode" name="productCode" class="form-control" type="text"
                                            maxlength="20" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="productCategory" class="form-label">Categoría</label>
                                        <select id="productCategory" name="productCategory" class="form-select"
                                            required></select>
                                    </div>
                                    <div class="mb-3">
                                        <label for="productDescription" class="form-label">Descripción breve</label>
                                        <input id="productDescription" name="productDescription" class="form-control"
                                            type="text" maxlength="120" required>
                                    </div>
                                    <div class="row g-2">
                                        <div class="col-6">
                                            <label for="productPrice" class="form-label">Precio</label>
                                            <input id="productPrice" name="productPrice" class="form-control"
                                                type="number" min="0" step="0.01" required>
                                        </div>
                                        <div class="col-6">
                                            <label for="productStock" class="form-label">Stock</label>
                                            <input id="productStock" name="productStock" class="form-control"
                                                type="number" min="0" step="1" required>
                                        </div>
                                    </div>
                                    <div class="mt-3 mb-3">
                                        <label for="productImageName" class="form-label">Archivo de imagen en carpeta
                                            img</label>
                                        <input id="productImageName" name="productImageName" class="form-control"
                                            type="text" placeholder="ejemplo.jpg">
                                    </div>
                                    <button class="btn btn-primary w-100" type="submit">Agregar producto</button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <div class="row g-4 mt-1">
                        <div class="col-12 col-md-6">
                            <div class="admin-box">
                                <h4 class="h6">Editar / Eliminar categoría</h4>
                                <form id="categoryEditForm" novalidate>
                                    <div class="mb-3">
                                        <label for="editCategorySelect" class="form-label">Categoría a editar</label>
                                        <select id="editCategorySelect" class="form-select"></select>
                                    </div>
                                    <div class="mb-3">
                                        <label for="editCategoryId" class="form-label">Nuevo identificador</label>
                                        <input id="editCategoryId" class="form-control" type="text" maxlength="30" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="editCategoryName" class="form-label">Nuevo nombre</label>
                                        <input id="editCategoryName" class="form-control" type="text" maxlength="60" required>
                                    </div>
                                    <div class="admin-actions">
                                        <button class="btn btn-primary" type="submit">Guardar cambios</button>
                                        <button id="deleteCategoryBtn" class="btn btn-outline-danger" type="button">Eliminar categoría</button>
                                    </div>
                                </form>
                            </div>
                        </div>

                        <div class="col-12 col-md-6">
                            <div class="admin-box">
                                <h4 class="h6">Editar / Eliminar producto</h4>
                                <form id="productEditForm" novalidate>
                                    <div class="mb-3">
                                        <label for="editProductSelect" class="form-label">Producto a editar</label>
                                        <select id="editProductSelect" class="form-select"></select>
                                    </div>
                                    <div class="mb-3">
                                        <label for="editProductTitle" class="form-label">Título</label>
                                        <input id="editProductTitle" class="form-control" type="text" maxlength="100" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="editProductCode" class="form-label">Código</label>
                                        <input id="editProductCode" class="form-control" type="text" maxlength="20" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="editProductCategory" class="form-label">Categoría</label>
                                        <select id="editProductCategory" class="form-select" required></select>
                                    </div>
                                    <div class="mb-3">
                                        <label for="editProductDescription" class="form-label">Descripción</label>
                                        <input id="editProductDescription" class="form-control" type="text" maxlength="120" required>
                                    </div>
                                    <div class="row g-2">
                                        <div class="col-6">
                                            <label for="editProductPrice" class="form-label">Precio</label>
                                            <input id="editProductPrice" class="form-control" type="number" min="0" step="0.01" required>
                                        </div>
                                        <div class="col-6">
                                            <label for="editProductStock" class="form-label">Stock</label>
                                            <input id="editProductStock" class="form-control" type="number" min="0" step="1" required>
                                        </div>
                                    </div>
                                    <div class="mt-3 mb-3">
                                        <label for="editProductImageName" class="form-label">Archivo de imagen (img)</label>
                                        <input id="editProductImageName" class="form-control" type="text" placeholder="ejemplo.jpg">
                                    </div>
                                    <div class="admin-actions">
                                        <button class="btn btn-primary" type="submit">Guardar cambios</button>
                                        <button id="deleteProductBtn" class="btn btn-outline-danger" type="button">Eliminar producto</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="confirmActionModal" tabindex="-1" aria-labelledby="confirmActionModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 class="modal-title fs-5" id="confirmActionModalLabel">Confirmar acción</h3>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <p id="confirmActionModalText" class="mb-0">¿Deseas continuar?</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger" id="confirmActionBtn">Confirmar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
